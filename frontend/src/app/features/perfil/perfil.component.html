<h2>Mi Perfil</h2>
<form [formGroup]="form" (ngSubmit)="actualizarPerfil()">
  <label>Nombre:</label>
  <input formControlName="nombre" />
  <div *ngIf="form.get('nombre')?.touched && form.get('nombre')?.invalid">
    <span *ngIf="form.get('nombre')?.errors?.['required']">El nombre es obligatorio.</span>
  </div>

  <label>Apellido:</label>
  <input formControlName="apellido" />
  <div *ngIf="form.get('apellido')?.touched && form.get('apellido')?.invalid">
    <span *ngIf="form.get('apellido')?.errors?.['required']">El apellido es obligatorio.</span>
  </div>

  <label>Edad:</label>
  <input type="number" formControlName="edad" />
  <div *ngIf="form.get('edad')?.touched && form.get('edad')?.invalid">
    <span *ngIf="form.get('edad')?.errors?.['required']">La edad es obligatoria.</span>
    <span *ngIf="form.get('edad')?.errors?.['min'] || form.get('edad')?.errors?.['max']">Edad entre 18 y 120.</span>
  </div>

  <label>Correo:</label>
  <input type="email" formControlName="correo" />
  <div *ngIf="form.get('correo')?.touched && form.get('correo')?.invalid">
    <span *ngIf="form.get('correo')?.errors?.['required']">El correo es obligatorio.</span>
    <span *ngIf="form.get('correo')?.errors?.['email']">Formato de correo inválido.</span>
  </div>

  <label>Teléfono:</label>
  <input formControlName="telefono" />
  <div *ngIf="form.get('telefono')?.touched && form.get('telefono')?.invalid">
    <span *ngIf="form.get('telefono')?.errors?.['required']">El teléfono es obligatorio.</span>
    <span *ngIf="form.get('telefono')?.errors?.['pattern']">Teléfono de 8 dígitos.</span>
  </div>

  <button type="submit">Actualizar</button>
</form>
<div *ngIf="error" style="color:red">{{ error }}</div>
