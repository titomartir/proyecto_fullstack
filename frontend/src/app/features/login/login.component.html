<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-blue-100 py-8">
  <form
    class="w-full max-w-md bg-white/90 backdrop-blur-lg rounded-3xl shadow-2xl p-10 border border-blue-100"
    [formGroup]="form"
    (ngSubmit)="login()"
  >
    <h2 class="text-3xl font-extrabold text-blue-700 mb-8 text-center tracking-tight drop-shadow">Iniciar Sesión</h2>

    <div class="mb-6">
      <label for="email" class="block text-gray-700 font-semibold mb-2">Email:</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-blue-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12H8m8 0a4 4 0 11-8 0 4 4 0 018 0zm0 0v1a2 2 0 01-2 2H8a2 2 0 01-2-2v-1" /></svg>
        </span>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="username"
          class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-blue-50 text-gray-800 shadow-inner transition-all"
        />
      </div>
      <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="text-red-600 text-sm mt-1">
        <span *ngIf="form.get('email')?.errors?.['required']">El email es obligatorio.</span>
        <span *ngIf="form.get('email')?.errors?.['email']">Formato de email inválido.</span>
      </div>
    </div>

    <div class="mb-6">
      <label for="password" class="block text-gray-700 font-semibold mb-2">Contraseña:</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-blue-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v2m0-2h2m-2 0H8m4-6a4 4 0 11-8 0 4 4 0 018 0zm0 0v1a2 2 0 01-2 2H8a2 2 0 01-2-2v-1" /></svg>
        </span>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-blue-50 text-gray-800 shadow-inner transition-all"
        />
      </div>
      <div *ngIf="form.get('password')?.touched && form.get('password')?.invalid" class="text-red-600 text-sm mt-1">
        <span *ngIf="form.get('password')?.errors?.['required']">La contraseña es obligatoria.</span>
      </div>
    </div>

    <button
      type="submit"
      class="w-full py-2 mt-2 rounded-xl bg-gradient-to-r from-blue-600 to-blue-400 text-white font-bold text-lg shadow-lg hover:from-blue-700 hover:to-blue-500 transition-colors tracking-wide drop-shadow"
    >Entrar</button>

    <div *ngIf="error" class="text-red-600 text-center mt-3">{{ error }}</div>
  </form>
</div>
<div class="flex justify-center -mt-2">
  <div class="text-center text-gray-700 bg-white/80 rounded-xl px-6 py-3 shadow border border-blue-100">
    ¿No tienes cuenta?
    <button
      type="button"
      [routerLink]="'/register'"
      class="inline-block ml-1 px-3 py-1 rounded-lg text-blue-600 hover:bg-blue-100 hover:underline font-medium focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer transition-all"
    >Regístrate</button>
  </div>
</div>
